<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin Login Notification</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.5; color: #222;">
  <h2>Admin Login Successful</h2>
  <p>Hello {{userName}},</p>
  <p>Your NovaHR admin account was successfully used to sign in.</p>
  <ul>
    <li><strong>Time:</strong> {{loginTime}}</li>
    <li><strong>IP Address:</strong> {{ipAddress}}</li>
    <li><strong>Device/User Agent:</strong> {{userAgent}}</li>
  </ul>
  <p>If this was not you, reset your password immediately and contact IT support.</p>
</body>
</html>
