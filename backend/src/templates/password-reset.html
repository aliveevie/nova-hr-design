<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.5; color: #222;">
  <h2>Password Reset Request</h2>
  <p>Hello {{userName}},</p>
  <p>We received a request to reset your password for your NovaHR account.</p>
  <p>
    <a href="{{resetUrl}}" style="display:inline-block;padding:10px 16px;background:#1f6feb;color:#fff;text-decoration:none;border-radius:6px;">
      Reset Password
    </a>
  </p>
  <p>This link expires in {{expiresMinutes}} minutes and can only be used once.</p>
  <p>If you did not request this reset, you can safely ignore this email.</p>
</body>
</html>
