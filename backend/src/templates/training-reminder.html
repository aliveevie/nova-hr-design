<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background-color: #4F46E5; color: white; padding: 20px; text-align: center; }
    .content { background-color: #f9fafb; padding: 20px; }
    .info-box { background-color: white; padding: 15px; margin: 10px 0; border-left: 4px solid #4F46E5; }
    .footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Training Reminder</h1>
    </div>
    <div class="content">
      <p>Dear {{employeeName}},</p>
      <p>This is a reminder about your upcoming training.</p>
      
      <div class="info-box">
        <strong>Training:</strong> {{trainingTitle}}<br>
        <strong>Date:</strong> {{date}}
      </div>
      
      <p>Please ensure you are prepared and available for this training session.</p>
    </div>
    <div class="footer">
      <p>This is an automated email from NovaHR System</p>
    </div>
  </div>
</body>
</html>
