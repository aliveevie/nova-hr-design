<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background-color: #4F46E5; color: white; padding: 20px; text-align: center; }
    .content { background-color: #f9fafb; padding: 20px; }
    .info-box { background-color: white; padding: 15px; margin: 10px 0; border-left: 4px solid #4F46E5; }
    .score { font-size: 24px; font-weight: bold; color: #4F46E5; }
    .footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Performance Review Completed</h1>
    </div>
    <div class="content">
      <p>Dear {{employeeName}},</p>
      <p>Your performance review has been completed.</p>
      
      <div class="info-box">
        <p>Overall Score: <span class="score">{{overallScore}}%</span></p>
        <p>Rating: <strong>{{rating}}</strong></p>
      </div>
      
      <p>You can view the detailed review in the HR system.</p>
    </div>
    <div class="footer">
      <p>This is an automated email from NovaHR System</p>
    </div>
  </div>
</body>
</html>
